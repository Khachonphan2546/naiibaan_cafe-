<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - Naii Baan Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --primary-orange: #FD7E14; --bg-cream: #FFF8F0; }
        
        body { 
            background-color: var(--bg-cream); 
            font-family: 'Sarabun', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
            padding: 20px; 
        }

        .register-card { 
            background: white; 
            border-radius: 30px; 
            padding: 40px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 500px; 
            text-align: center;
        }

        .brand-logo-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 1px solid #828282;
        }

        .btn-register { 
            background: var(--primary-orange); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            padding: 14px; 
            font-weight: 600; 
            width: 100%; 
            transition: 0.3s; 
            font-size: 1.1rem; 
            cursor: pointer;
        }

        .btn-register:hover { 
            background: #e36802; 
            transform: translateY(-2px); 
        }

        .input-group-text { 
            background: #fafafa; 
            border: 1px solid #eee; 
            border-radius: 15px 0 0 15px; 
            color: #aaa; 
            width: 45px; 
            justify-content: center; 
        }

        .form-control { 
            border-radius: 0 15px 15px 0; 
            padding: 12px 15px; 
            border: 1px solid #eee; 
            background: #fafafa; 
        }

        .form-control:focus {
            box-shadow: none;
            border-color: var(--primary-orange);
            background: white;
        }

        .form-label { 
            display: block; 
            text-align: left; 
            margin-left: 5px; 
            color: #555; 
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="text-center mb-4">
            <img src="Naii.png" class="brand-logo-circle">
            <h3 class="fw-bold">สมัครสมาชิก</h3>
            <p class="text-muted small">กรอกข้อมูลให้ครบถ้วนเพื่อเริ่มใช้งาน</p>
        </div>
        
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label small fw-bold">ชื่อผู้ใช้งาน (Username)</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                    <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">เบอร์โทรศัพท์</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                    <input type="tel" class="form-control" id="phone" placeholder="กรอกเบอร์โทรศัพท์" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">ชื่อ-นามสกุล</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" id="full_name" placeholder="กรอกชื่อ-นามสกุล" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">รหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="อย่างน้อย 8 ตัวอักษร (มีพิมพ์ใหญ่, พิมพ์เล็ก และตัวเลข)" required>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label small fw-bold">ยืนยันรหัสผ่าน</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                    <input type="password" class="form-control" id="confirm_password" placeholder="ยืนยันรหัสผ่านอีกครั้ง" required>
                </div>
            </div>

            <button type="submit" class="btn-register shadow-sm">ยืนยันการสมัคร</button>
            <div class="text-center mt-4">
                <small class="text-muted d-block mt-1 text-start" style="font-size: 0.75rem;"></small>
            </div>
        </form>
    </div>

   <script>
    const API_URL = 'https://naiibaancafe-production.up.railway.app';

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const phone = document.getElementById('phone').value;
        const full_name = document.getElementById('full_name').value;
        const password = document.getElementById('password').value;
        const confirm_password = document.getElementById('confirm_password').value;

        // ✅ เพิ่มการตรวจสอบความปลอดภัยของรหัสผ่าน
        // เงื่อนไข: ยาว 8 ตัวขึ้นไป, มีพิมพ์ใหญ่, พิมพ์เล็ก และตัวเลข
        const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;

        if (!passwordRegex.test(password)) {
            alert('❌ รหัสผ่านไม่ปลอดภัยพอ!\nกรุณาตั้งให้ยาวอย่างน้อย 8 ตัวอักษร และประกอบด้วยตัวอักษรพิมพ์เล็ก (a-z), พิมพ์ใหญ่ (A-Z) และตัวเลข (0-9) ครับ');
            return;
        }

        if (password !== confirm_password) {
            alert('❌ รหัสผ่านไม่ตรงกันครับ');
            return;
        }

        const userData = {
            username: username,
            phone: phone,
            full_name: full_name,
            password: password,
            role: 'customer'
        };

        try {
            const res = await fetch(`${API_URL}/api/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (res.ok) {
                alert('✅ สมัครสมาชิกสำเร็จ!');
                window.location.href = 'login.html'; 
            } else {
                const error = await res.json();
                alert('❌ ' + (error.message || 'Username หรือเบอร์โทรนี้มีในระบบแล้ว'));
            }
        } catch (err) {
            alert('❌ เชื่อมต่อ Server ไม่ได้');
        }
    });
</script>
</body>
</html>
