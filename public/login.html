<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Naii Baan Cafe</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    
    <style>
        :root { --primary-orange: #FD7E14; --bg-cream: #FFF8F0; }
        
        body { 
            background-color: var(--bg-cream); 
            font-family: 'Sarabun', sans-serif; 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0; 
        }

        .login-card { 
            background: white; 
            border-radius: 30px; 
            padding: 50px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
            width: 100%; 
            max-width: 450px; 
            text-align: center; 
        }

        .brand-logo-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 15px;
            border: 1px solid #828282;
        }

        .btn-login { 
            background: var(--primary-orange); 
            color: white; 
            border: none; 
            border-radius: 15px; 
            padding: 14px; 
            font-weight: 600; 
            width: 100%; 
            transition: 0.3s; 
            font-size: 1.1rem; 
            cursor: pointer; 
        }

        .btn-login:hover { 
            background: #e36802; 
        }

        .form-control { 
            border-radius: 15px; 
            padding: 12px 15px; 
            border: 1px solid #eee; 
            background: #fafafa; 
        }

        .form-label { 
            display: block; 
            text-align: left; 
            margin-left: 5px; 
            color: #555; 
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center mb-4">
            <img src="Naii.png" class="brand-logo-circle">
            <h3 class="fw-bold">Naii Baan Cafe</h3>
            <p class="text-muted small">กรอกข้อมูลเข้าสู่ระบบ</p>
        </div>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-bold"><i class="fas fa-user me-1"></i> ชื่อผู้ใช้งาน</label>
                <input type="text" class="form-control" id="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold"><i class="fas fa-lock me-1"></i> รหัสผ่าน</label>
                <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน" required>
            </div>
            <button type="submit" class="btn-login shadow-sm">เข้าสู่ระบบ</button>
            
            <div class="mt-4">
                <small class="text-muted">ยังไม่มีบัญชี? <a href="register.html" style="color: var(--primary-orange); text-decoration: none; font-weight: 600;">สมัครสมาชิก</a></small>
            </div>

            <hr class="my-4">

            <div class="text-center mt-3">
                <p class="text-muted small">หรือเข้าสู่ระบบด้วย</p>
                
                <div id="g_id_onload"
                     data-client_id="669190044603-jonumocatej1sdtcfkqmqnp383do3um8.apps.googleusercontent.com"
                     data-callback="handleCredentialResponse"
                     data-auto_prompt="false">
                </div>

                <div class="g_id_signin d-flex justify-content-center" 
                     data-type="standard" 
                     data-shape="pill" 
                     data-theme="outline" 
                     data-text="signin_with" 
                     data-size="large" 
                     data-logo_alignment="left">
                </div>
            </div>
        </form>
    </div>

    <script>
    const API_URL = 'https://naiibaancafe-production.up.railway.app';

   async function handleCredentialResponse(response) {
    try {
        const res = await fetch(`${API_URL}/api/google-login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: response.credential })
        });

        const data = await res.json();
        if (res.ok && data.success) {
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = 'index.html'; // ล็อกอินผ่านแล้วไปหน้าแรกเลย
        } else {
            alert("❌ " + (data.message || "ล็อกอินไม่สำเร็จ"));
        }
    } catch (err) {
        alert("❌ ไม่สามารถเชื่อมต่อกับ Server ได้ (เช็ค ngrok หรือ Backend ครับ)");
    }
}

    // ✅ 2. ฟังก์ชันล็อกอินปกติ (Username/Password)
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;

        try {
            const res = await fetch(`${API_URL}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();

            if (res.ok && data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                const role = data.user.role;
                
                if (role === 'owner') {
                    window.location.href = 'admin_dashboard.html';
                } else if (role === 'staff') {
                    window.location.href = 'pos.html';
                } else {
                    window.location.href = 'index.html'; 
                }
            } else {
                alert(data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
            }
        } catch (error) {
            console.error("Login Error:", error);
            alert('ไม่สามารถเชื่อมต่อกับระบบได้');
        }
    });
    </script>
</body>
</html>
